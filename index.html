<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#1e3a5f">
<title>MSS · KIA Leads</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--muted:#64748b;--text:#e2e8f0;--sub:#94a3b8;--blue:#38bdf8;--green:#22c55e;--orange:#f97316;--red:#ef4444;--purple:#a78bfa;--teal:#2dd4bf;--yellow:#facc15;--nav-h:60px;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
body{display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative}
/* ---- login ---- */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:290px;text-align:center}
.login-logo{font-size:26px;font-weight:800;color:var(--teal);letter-spacing:1px}
.login-logo span{color:var(--blue)}
.login-sub{font-size:12px;color:var(--muted);margin:6px 0 26px}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:16px;outline:none;margin-bottom:14px;text-align:center;letter-spacing:3px}
.login-box input:focus{border-color:var(--teal)}
.login-btn{width:100%;background:var(--teal);color:#0f172a;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
.login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:14px}
/* ---- header ---- */
header{background:linear-gradient(135deg,#1e3a5f,#1C4445);padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0px));flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:1.05rem;font-weight:700}header h1 span{color:var(--blue)}
.periodo-badge{font-size:.6rem;color:var(--sub);margin-top:2px}
.h-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mes-sel{background:rgba(15,23,42,.5);color:var(--text);border:1px solid rgba(148,163,184,.35);border-radius:9px;padding:7px 8px;font-size:.75rem;font-weight:700;font-family:inherit;cursor:pointer;outline:none;max-width:120px}
.mes-sel:focus{border-color:var(--blue)}
#refresh{width:36px;height:36px;border-radius:50%;border:none;background:rgba(56,189,248,.15);color:var(--blue);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#refresh:active{transform:scale(.9)}
#refresh.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:12px 12px calc(var(--nav-h) + var(--safe-b) + 12px);display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
nav button{flex:1;border:none;background:none;color:var(--sub);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;transition:.15s}
nav button .icon{font-size:1.25rem;line-height:1}nav button.active{color:var(--blue)}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.card-title{font-size:.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px}
.card-title .aside{float:right;text-transform:none;letter-spacing:0;color:var(--muted);font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 12px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi.blue::before{background:var(--blue)}.kpi.green::before{background:var(--green)}.kpi.orange::before{background:var(--orange)}.kpi.red::before{background:var(--red)}.kpi.teal::before{background:var(--teal)}.kpi.yellow::before{background:var(--yellow)}.kpi.purple::before{background:var(--purple)}
.kpi-lbl{font-size:.65rem;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-val{font-size:1.5rem;font-weight:800;line-height:1}
.kpi.blue .kpi-val{color:var(--blue)}.kpi.green .kpi-val{color:var(--green)}.kpi.orange .kpi-val{color:var(--orange)}.kpi.red .kpi-val{color:var(--red)}.kpi.teal .kpi-val{color:var(--teal)}.kpi.yellow .kpi-val{color:var(--yellow)}.kpi.purple .kpi-val{color:var(--purple)}
.kpi-cmp{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-top:8px;font-size:.6rem;font-weight:700}
.kpi-cmp .cmp-base{color:var(--muted);font-weight:500}
.cmp-up{color:var(--green)}.cmp-down{color:var(--red)}.cmp-flat{color:var(--muted)}
.cnt-highlight{background:linear-gradient(135deg,#0d2137,#0f2a1e);border-radius:12px;padding:16px;border:1px solid #1e3a5f;margin-bottom:12px}
.ch-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.ch-mes{font-size:.7rem;color:var(--teal);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.ch-corte{font-size:.62rem;color:var(--muted)}
.ch-val{font-size:2.3rem;font-weight:800;color:var(--teal);line-height:1.05;margin-top:4px}
.ch-unit{font-size:.9rem;font-weight:600;color:var(--sub)}
.ch-base{font-size:.72rem;color:var(--sub);margin-top:8px}
.ch-base strong{color:var(--text)}
.ch-delta{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:700;margin-top:8px;padding:4px 9px;border-radius:7px;background:rgba(0,0,0,.25)}
.cmp-row{display:flex;align-items:center;gap:8px;background:#0f172a;border-radius:7px;padding:7px 9px;margin-bottom:6px}
.cmp-row:last-child{margin-bottom:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cmp-row .nm{flex:0 0 auto;max-width:34%;font-size:.72rem;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-bar{flex:1;height:6px;border-radius:3px;background:#1e293b;overflow:hidden}
.mini-bar i{display:block;height:100%;border-radius:3px}
.cmp-row .pr{font-size:.72rem;color:var(--text);font-weight:700;width:38px;text-align:right;flex-shrink:0}
.cmp-row .chg{font-size:.6rem;font-weight:700;width:46px;text-align:right;flex-shrink:0}
.rank-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid rgba(51,65,85,.5)}
.rank-row:last-child{border-bottom:none}
.rank-n{width:22px;height:22px;border-radius:50%;background:#0f172a;color:var(--muted);font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-n.g1{background:var(--yellow);color:#0f172a}.rank-n.g2{background:var(--sub);color:#0f172a}.rank-n.g3{background:var(--orange);color:#0f172a}
.rank-name{flex:1;font-size:.78rem;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.rank-bar{width:62px;height:6px;border-radius:3px;background:#0f172a;overflow:hidden;flex-shrink:0}
.rank-bar i{display:block;height:100%;background:var(--teal);border-radius:3px}
.rank-val{font-size:.75rem;font-weight:700;color:var(--text);width:32px;text-align:right;flex-shrink:0}
.rank-chg{flex-shrink:0}
.estado-pill{background:#0f172a;border-radius:8px;padding:9px 11px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.estado-pill:last-child{margin-bottom:0}
.estado-pill .en{font-size:.74rem;color:var(--sub);display:flex;align-items:center;gap:8px}
.estado-pill .ev{font-size:.74rem;font-weight:700}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mini-stat{background:#0f172a;border-radius:8px;padding:10px;text-align:center}
.mini-stat .v{font-size:1.15rem;font-weight:800}.mini-stat .l{font-size:.58rem;color:var(--muted);text-transform:uppercase;margin-top:3px;letter-spacing:.5px}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:.6rem;color:var(--sub);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:14px;height:3px;border-radius:2px;display:inline-block}
.stamp{font-size:.62rem;color:var(--muted);text-align:center;padding:6px 0 2px}
svg{display:block;width:100%;height:auto}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 14px);left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--teal);color:var(--teal);border-radius:10px;padding:10px 18px;font-size:.8rem;font-weight:600;z-index:500;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style></head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">MSS · <span>KIA</span></div>
    <div class="login-sub">Reportería de Leads</div>
    <input id="pin" type="password" inputmode="numeric" placeholder="• • • •" autocomplete="off">
    <button class="login-btn" id="entrar">Entrar</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<header>
  <div>
    <h1>MSS · <span>KIA</span></h1>
    <div class="periodo-badge" id="stamp">—</div>
  </div>
  <div class="h-right">
    <select id="mesSel" class="mes-sel" aria-label="Mes"></select>
    <button id="refresh" title="Actualizar" aria-label="Actualizar">⟳</button>
  </div>
</header>

<div id="pages">
  <div class="page active" id="p-resumen"></div>
  <div class="page" id="p-canales"></div>
  <div class="page" id="p-vendedores"></div>
  <div class="page" id="p-modelos"></div>
</div>

<nav>
  <button class="active" data-p="p-resumen"><span class="icon">📊</span>Resumen</button>
  <button data-p="p-canales"><span class="icon">📣</span>Canales</button>
  <button data-p="p-vendedores"><span class="icon">🧑‍💼</span>Vendedores</button>
  <button data-p="p-modelos"><span class="icon">🚗</span>Modelos</button>
</nav>

<div id="toast"></div>

<script>
const PIN = '2026';                 // código de acceso (cámbialo en index.html)
const MESES=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const HEX={blue:'#38bdf8',teal:'#2dd4bf',purple:'#a78bfa',orange:'#f97316',green:'#22c55e',yellow:'#facc15',red:'#ef4444'};
const PAL=['blue','teal','purple','orange','green','yellow','red'];
const NBASE=3;
let REC=[], MLIST=[], mesesSet={}, GEN='';

const nf=n=>Math.round(n).toLocaleString('es-CL');
const pct=(a,b)=>b?Math.round(a/b*100):0;
const pct1=(a,b)=>b?(Math.round(a/b*1000)/10).toLocaleString('es-CL'):'0';
const millones=n=>'$'+nf(n/1e6)+' M';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const nombreMes=k=>{const[y,m]=k.split('-');return MESES[+m]+' '+y;};
const mesCorto=k=>{const[y,m]=k.split('-');return MESES[+m].slice(0,3)+' '+y.slice(2);};

function stats(rs){
  const by=(f)=>{const m={};rs.forEach(r=>{const k=f(r);if(k)m[k]=(m[k]||0)+1;});return m;};
  const monto=rs.reduce((s,r)=>s+r.t,0), conMonto=rs.filter(r=>r.t>0).length;
  return {total:rs.length,
    contactado:rs.filter(r=>r.f==='Contactado').length,
    intento:rs.filter(r=>r.f==='Intento Contacto').length,
    sinGestion:rs.filter(r=>r.f==='Sin Gestión').length,
    ganadas:rs.filter(r=>r.e==='Lograda').length,
    perdidas:rs.filter(r=>r.e==='Perdida').length,
    abiertas:rs.filter(r=>r.e==='Abierta').length,
    monto, ticket:conMonto?monto/conMonto:0,
    origen:by(r=>r.o),sucursal:by(r=>r.s),modelo:by(r=>r.mo),vendedor:by(r=>r.v),
    ganaVend:(()=>{const m={};rs.forEach(r=>{if(r.e==='Lograda')m[r.v]=(m[r.v]||0)+1;});return m;})()};
}
const delMes=(mk,D)=>REC.filter(r=>r.m===mk&&r.d<=D);

function baseline(mk,D){
  const idx=MLIST.indexOf(mk), previos=MLIST.slice(Math.max(0,idx-NBASE),idx);
  if(!previos.length) return {n:0};
  const st=previos.map(p=>stats(delMes(p,D)));
  const avg=sel=>st.reduce((s,x)=>s+sel(x),0)/st.length;
  const avgMap=key=>{const acc={};st.forEach(x=>{for(const k in x[key])acc[k]=(acc[k]||0)+x[key][k];});for(const k in acc)acc[k]/=st.length;return acc;};
  return {n:previos.length,meses:previos,
    total:avg(x=>x.total),contactado:avg(x=>x.contactado),intento:avg(x=>x.intento),
    sinGestion:avg(x=>x.sinGestion),ganadas:avg(x=>x.ganadas),perdidas:avg(x=>x.perdidas),abiertas:avg(x=>x.abiertas),
    monto:avg(x=>x.monto),ticket:avg(x=>x.ticket),
    origen:avgMap('origen'),sucursal:avgMap('sucursal'),modelo:avgMap('modelo'),vendedor:avgMap('vendedor')};
}
function cmpHTML(cur,avg,goodUp){
  if(avg==null||avg<=0) return '<div class="kpi-cmp '+(cur>0?'cmp-up':'cmp-flat')+'"><span>'+(cur>0?'▲ nuevo':'▬ —')+'</span><span class="cmp-base">sin base</span></div>';
  const diff=cur-avg, flat=Math.round(Math.abs(diff)/avg*100)===0, up=diff>0, p=Math.round(Math.abs(diff)/avg*100);
  const cls=flat?'cmp-flat':((up===goodUp)?'cmp-up':'cmp-down'), ar=flat?'▬':(up?'▲':'▼');
  return '<div class="kpi-cmp '+cls+'"><span>'+ar+' '+(flat?'0%':((up?'+':'−')+p+'%'))+'</span><span class="cmp-base">prom '+nf(avg)+'</span></div>';
}
function chgPill(cur,avg,goodUp){
  if(avg==null||avg<=0) return '<span class="chg cmp-flat">nuevo</span>';
  const diff=cur-avg, flat=Math.round(Math.abs(diff)/avg*100)===0, up=diff>0, p=Math.round(Math.abs(diff)/avg*100);
  const cls=flat?'cmp-flat':((up===goodUp)?'cmp-up':'cmp-down'), ar=flat?'▬':(up?'▲':'▼');
  return '<span class="chg '+cls+'">'+ar+(flat?'0':((up?'+':'−')+p))+'%</span>';
}
function acumDe(mk,D){const pd=new Array(D+1).fill(0);delMes(mk,D).forEach(r=>{if(r.d<=D)pd[r.d]++;});const o=[];let a=0;for(let d=1;d<=D;d++){a+=pd[d];o.push(a);}return o;}
function svgAcum(mk,D){
  const W=460,H=160,pl=6,pr=6,pt=8,pb=18,iw=W-pl-pr,ih=H-pt-pb;
  const idx=MLIST.indexOf(mk), previos=MLIST.slice(Math.max(0,idx-NBASE),idx);
  const series=[{mk,cur:true,acum:acumDe(mk,D)}].concat(previos.slice().reverse().map(p=>({mk:p,cur:false,acum:acumDe(p,D)})));
  const maxY=Math.max(1,...series.flatMap(s=>s.acum));
  const X=i=>pl+(D<=1?0:i/(D-1)*iw), Y=v=>pt+ih-(v/maxY*ih);
  const poly=arr=>arr.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  const gridY=[0,.5,1].map(f=>{const y=(pt+ih-f*ih).toFixed(1);return '<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#334155" stroke-width="1" stroke-dasharray="2 4"/>';}).join('');
  const COLS=['#38bdf8','#a78bfa','#f97316','#2dd4bf'];
  const lines=series.map((s,i)=>{const c=COLS[i%COLS.length],w=s.cur?2.6:1.8,dash=s.cur?'':' stroke-dasharray="4 4"',last=s.acum.length-1;
    return '<polyline points="'+poly(s.acum)+'" fill="none" stroke="'+c+'" stroke-width="'+w+'"'+dash+'/><circle cx="'+X(last).toFixed(1)+'" cy="'+Y(s.acum[last]).toFixed(1)+'" r="'+(s.cur?3.5:2.8)+'" fill="'+c+'"/>';}).join('');
  const lbls='<text x="'+pl+'" y="'+(H-5)+'" fill="#64748b" font-size="9">día 1</text><text x="'+(W-pr)+'" y="'+(H-5)+'" fill="#64748b" font-size="9" text-anchor="end">día '+D+'</text>';
  const legend='<div class="legend">'+series.map((s,i)=>'<span><i style="background:'+COLS[i%COLS.length]+'"></i>'+mesCorto(s.mk)+'</span>').join('')+'</div>';
  return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+gridY+lines+lbls+'</svg>'+legend;
}
function barRows(mapCur,mapBase,goodUp){
  const rows=Object.entries(mapCur).sort((a,b)=>b[1]-a[1]), max=Math.max(1,...rows.map(r=>r[1]));
  return rows.map(([nm,n],i)=>{const c=PAL[i%PAL.length];
    return '<div class="cmp-row"><span class="dot" style="background:'+HEX[c]+'"></span><span class="nm">'+esc(nm)+'</span><div class="mini-bar"><i style="width:'+pct(n,max)+'%;background:'+HEX[c]+'"></i></div><span class="pr">'+nf(n)+'</span>'+chgPill(n,mapBase&&mapBase[nm],goodUp)+'</div>';}).join('');
}
function rankRows(mapCur,mapBase){
  const rows=Object.entries(mapCur).sort((a,b)=>b[1]-a[1]).slice(0,12), max=Math.max(1,...rows.map(r=>r[1]));
  return rows.map(([nm,n],i)=>{const g=i<3?' g'+(i+1):'';
    return '<div class="rank-row"><span class="rank-n'+g+'">'+(i+1)+'</span><span class="rank-name">'+esc(nm)+'</span><div class="rank-bar"><i style="width:'+pct(n,max)+'%"></i></div><span class="rank-val">'+nf(n)+'</span>'+chgPill(n,mapBase&&mapBase[nm],true)+'</div>';}).join('');
}
function kpi(cls,lbl,val,cmp){return '<div class="kpi '+cls+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div>'+(cmp||'')+'</div>';}

function render(mk){
  const D=mesesSet[mk], cur=stats(delMes(mk,D)), base=baseline(mk,D), corte='días 1–'+D;
  const diff=base.n?cur.total-base.total:0, up=diff>0, p=base.n?Math.round(Math.abs(diff)/base.total*100):0, flat=base.n&&p===0;
  const dcls=!base.n?'cmp-flat':(flat?'cmp-flat':(up?'cmp-up':'cmp-down'));
  const highlight='<div class="cnt-highlight"><div class="ch-top"><span class="ch-mes">'+nombreMes(mk)+'</span><span class="ch-corte">al día '+D+'</span></div>'+
    '<div class="ch-val">'+nf(cur.total)+' <span class="ch-unit">leads</span></div>'+
    (base.n?'<div class="ch-base">Prom. '+corte+' de '+base.n+' '+(base.n===1?'mes':'meses')+' ant.: <strong>'+nf(base.total)+' leads</strong></div><div class="ch-delta '+dcls+'">'+(flat?'▬':(up?'▲':'▼'))+' '+(flat?'igual':((up?'+':'−')+nf(Math.abs(diff))+' leads · '+(up?'+':'−')+p+'%'))+'</div>':'<div class="ch-base">No hay meses anteriores para comparar.</div>')+'</div>';
  const grid='<div class="grid2">'+
    kpi('blue','Total leads',nf(cur.total),cmpHTML(cur.total,base.total,true))+
    kpi('teal','Contactados',nf(cur.contactado),cmpHTML(cur.contactado,base.contactado,true))+
    kpi('green','Ganadas',nf(cur.ganadas),cmpHTML(cur.ganadas,base.ganadas,true))+
    kpi('red','Perdidas',nf(cur.perdidas),cmpHTML(cur.perdidas,base.perdidas,false))+
    kpi('orange','Intento contacto',nf(cur.intento),cmpHTML(cur.intento,base.intento,true))+
    kpi('yellow','Sin gestión',nf(cur.sinGestion),cmpHTML(cur.sinGestion,base.sinGestion,false))+'</div>';
  const tasaBase=base.n&&base.total?(base.contactado+base.intento)/base.total*100:0;
  const tasaCard='<div class="card"><div class="card-title">Tasa de contacto</div>'+
    '<div class="estado-pill"><span class="en"><span class="dot" style="background:'+HEX.teal+'"></span>'+nombreMes(mk)+' ('+corte+')</span><span class="ev" style="color:'+HEX.teal+'">'+pct1(cur.contactado+cur.intento,cur.total)+'%</span></div>'+
    (base.n?'<div class="estado-pill"><span class="en"><span class="dot" style="background:#64748b"></span>Promedio '+base.n+' '+(base.n===1?'mes':'meses')+' ant.</span><span class="ev" style="color:#94a3b8">'+(Math.round(tasaBase*10)/10).toLocaleString('es-CL')+'%</span></div>':'')+'</div>';
  const chart='<div class="card"><div class="card-title">Acumulado de leads · mes a mes <span class="aside">'+corte+'</span></div>'+svgAcum(mk,D)+'</div>';
  document.getElementById('p-resumen').innerHTML=highlight+grid+tasaCard+chart+'<div class="stamp">Datos al '+(GEN||'—')+'</div>';

  document.getElementById('p-canales').innerHTML=
    '<div class="card"><div class="card-title">Leads por origen <span class="aside">vs '+(base.n?base.n+' m. ant.':'—')+'</span></div>'+barRows(cur.origen,base.n?base.origen:null,true)+'</div>'+
    '<div class="card"><div class="card-title">Leads por sucursal <span class="aside">vs '+(base.n?base.n+' m. ant.':'—')+'</span></div>'+barRows(cur.sucursal,base.n?base.sucursal:null,true)+'</div>';

  const vendRows=Object.entries(cur.vendedor).filter(([nm])=>nm!=='(sin asignar)').sort((a,b)=>b[1]-a[1]);
  const maxV=Math.max(1,...vendRows.map(r=>r[1])), totV=vendRows.reduce((s,r)=>s+r[1],0);
  const vendHTML=vendRows.map(([nm,n],i)=>{const g=i<3?' g'+(i+1):'', cierres=cur.ganaVend[nm]||0;
    return '<div class="rank-row"><span class="rank-n'+g+'">'+(i+1)+'</span><div style="flex:1;min-width:0"><div class="rank-name">'+esc(nm)+'</div>'+(cierres?'<div style="font-size:.58rem;color:var(--green);margin-top:1px">'+cierres+' '+(cierres===1?'cierre':'cierres')+'</div>':'')+'</div><div class="rank-bar"><i style="width:'+pct(n,maxV)+'%"></i></div><span class="rank-val">'+nf(n)+'</span>'+chgPill(n,base.n?base.vendedor[nm]:null,true)+'</div>';}).join('');
  const sinAsig=cur.vendedor['(sin asignar)']||0;
  document.getElementById('p-vendedores').innerHTML=
    '<div class="two"><div class="mini-stat"><div class="v" style="color:var(--blue)">'+vendRows.length+'</div><div class="l">Vendedores activos</div></div><div class="mini-stat"><div class="v" style="color:var(--teal)">'+nf(vendRows.length?Math.round(totV/vendRows.length):0)+'</div><div class="l">Leads/vendedor</div></div></div>'+
    '<div class="card"><div class="card-title">Ranking de vendedores <span class="aside">'+nombreMes(mk)+'</span></div>'+(vendHTML||'<div style="font-size:.75rem;color:var(--muted)">Sin datos.</div>')+(sinAsig?'<div class="estado-pill" style="margin-top:8px"><span class="en">Sin vendedor asignado</span><span class="ev" style="color:var(--muted)">'+sinAsig+'</span></div>':'')+'</div>';

  document.getElementById('p-modelos').innerHTML=
    '<div class="two"><div class="mini-stat"><div class="v" style="color:var(--teal)">$ '+nf(cur.ticket)+'</div><div class="l">Ticket promedio</div></div><div class="mini-stat"><div class="v" style="color:var(--blue)">'+millones(cur.monto)+'</div><div class="l">Monto cotizado</div></div></div>'+
    '<div class="card"><div class="card-title">Modelos más cotizados <span class="aside">Top 12</span></div>'+rankRows(cur.modelo,base.n?base.modelo:null)+'</div>';
}

// ---- carga de datos ----
function aplicarDatos(data){
  REC=data.records||[];
  mesesSet={};REC.forEach(r=>{mesesSet[r.m]=Math.max(mesesSet[r.m]||0,r.d);});
  MLIST=Object.keys(mesesSet).sort();
  GEN=data.generado?new Date(data.generado).toLocaleString('es-CL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
  document.getElementById('stamp').textContent='Actualizado: '+(GEN||'—');
  const sel=document.getElementById('mesSel'), prev=sel.value;
  sel.innerHTML='';
  MLIST.slice().reverse().forEach(mk=>{const op=document.createElement('option');op.value=mk;op.textContent=nombreMes(mk);sel.appendChild(op);});
  sel.value=(prev&&MLIST.includes(prev))?prev:MLIST[MLIST.length-1];
  render(sel.value);
}
async function cargar(forzar){
  const url='data.json'+(forzar?('?t='+Date.now()):'');
  const r=await fetch(url,{cache:forzar?'reload':'default'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  aplicarDatos(await r.json());
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t.__t);t.__t=setTimeout(()=>t.classList.remove('show'),2200);}

// ---- eventos ----
document.getElementById('mesSel').addEventListener('change',e=>{render(e.target.value);document.querySelectorAll('.page').forEach(p=>p.scrollTop=0);});
document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');const pg=document.getElementById(b.dataset.p);pg.classList.add('active');pg.scrollTop=0;}));
document.getElementById('refresh').addEventListener('click',async function(){
  this.classList.add('spin');
  try{await cargar(true);toast('Datos actualizados');}catch(e){toast('Sin conexión — mostrando lo último');}
  this.classList.remove('spin');
});

// ---- login ----
function entrar(){
  const v=document.getElementById('pin').value.trim();
  if(v===PIN){sessionStorage.setItem('kia_ok','1');document.getElementById('login').style.display='none';iniciar();}
  else{document.getElementById('lerr').textContent='Código incorrecto';}
}
document.getElementById('entrar').addEventListener('click',entrar);
document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')entrar();});

let iniciado=false;
async function iniciar(){
  if(iniciado)return;iniciado=true;
  try{await cargar(false);}catch(e){document.getElementById('p-resumen').innerHTML='<div class="card">No pude cargar los datos. Toca ⟳ para reintentar.</div>';}
}
if(sessionStorage.getItem('kia_ok')==='1'){document.getElementById('login').style.display='none';iniciar();}
else{document.getElementById('pin').focus();}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
